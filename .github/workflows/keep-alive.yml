name: keep-alive

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: install playwright
        run: |
          pip install --quiet playwright
          playwright install chromium --with-deps
      - name: wake app
        env:
          APP_URL: https://my-agent-much.streamlit.app
        run: python .github/scripts/wake_app.py
