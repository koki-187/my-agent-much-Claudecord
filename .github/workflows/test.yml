name: tests

# push / PR のたびに pytest を自動実行する CI ワークフロー
# 失敗するとマージ前に気付ける

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ['3.11', '3.13']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Syntax check (all .py files)
        run: |
          python -c "
          import ast, glob
          errors = []
          for fp in glob.glob('app/**/*.py', recursive=True):
              try: ast.parse(open(fp, encoding='utf-8').read())
              except SyntaxError as e: errors.append(f'{fp}:{e.lineno}: {e.msg}')
          if errors:
              print('\n'.join(errors)); exit(1)
          print(f'All {len(glob.glob(\"app/**/*.py\", recursive=True))} files OK')
          "
